schema_version: 1

context:
  version: "0.12.3"
  python_min: "3.11"

package:
  name: flax
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/flax/flax-${{ version }}.tar.gz
  sha256: 8b9ca031d0a4759b0719718de578b27703a8b2d6105552b30f98989ce1be04f0
  patches:
    # Remove after v0.12.5
    # c.f. https://github.com/google/flax/issues/5352
    - remove-orbax-export-from-dependencies.patch

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python >=${{ python_min }}
    - jax >=0.8.1
    - msgpack-python
    # c.f. https://github.com/google/flax/blob/7c487b1e00c10185aae41bb798f081e696f619e5/pyproject.toml#L19
    - numpy >=1.26.0,<2.4.0
    - optax
    - orbax-checkpoint
    - tensorstore
    - rich >=11.1.0
    - typing_extensions >=4.2.0
    - pyyaml >=5.4.1
    - treescope >=0.1.7

tests:
  - python:
      imports:
        - flax
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: "Flax: A neural network library for JAX designed for flexibility"
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/google/flax
  repository: https://github.com/google/flax
  documentation: http://flax.readthedocs.io

extra:
  recipe-maintainers:
    - pfackeldey
    - PhilipVinc
    - jheek
    - avital
    - levskaya
    - andsteing
    - gabrielcnr
    - traversaro
