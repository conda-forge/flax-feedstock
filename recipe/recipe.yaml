schema_version: 1

context:
  version: "0.12.2"
  python_min: "3.11"

package:
  name: flax
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/flax/flax-${{ version }}.tar.gz
  sha256: e9723b0881e571abe61885bb8770f53fdb3c383b6b3f5a923dcf6f1e9a687905

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python >=${{ python_min }}
    - jax >=0.8.1
    - msgpack-python
    - numpy >=1.23.2
    - optax
    - orbax-checkpoint
    - tensorstore
    - rich >=11.1.0
    - typing_extensions >=4.2.0
    - pyyaml >=5.4.1
    - treescope >=0.1.7

tests:
  - python:
      imports:
        - flax
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: "Flax: A neural network library for JAX designed for flexibility"
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/google/flax
  repository: https://github.com/google/flax
  documentation: http://flax.readthedocs.io

extra:
  recipe-maintainers:
    - pfackeldey
    - PhilipVinc
    - jheek
    - avital
    - levskaya
    - andsteing
    - gabrielcnr
    - traversaro
